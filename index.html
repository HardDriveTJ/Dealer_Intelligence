<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RamJet Racing Dealer Intelligence</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
  --bg:#050505;
  --panel:#111;
  --border:#222;
  --text:#fff;
  --muted:#9a9a9a;
  --red:#ff2b2b;
  --redSoft:#3a0d0d;
  --green:#2cff7a;
  --yellow:#ffcc00;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

.header{
  padding:20px 28px;
  border-bottom:1px solid var(--border);
}

.title{font-size:20px;font-weight:600;}
.sub{font-size:12px;color:var(--muted);}

.tabs{
  display:flex;
  gap:10px;
  padding:14px 28px;
  flex-wrap:wrap;
}

.tab-btn{
  padding:8px 14px;
  border-radius:999px;
  border:1px solid #5a1a1a;
  background:var(--redSoft);
  color:#fff;
  cursor:pointer;
  font-size:12px;
}

.tab-btn.active{background:var(--red);}

.content{padding:0 28px 30px;}
.tab{display:none;}
.tab.active{display:block;}

.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px;
  margin-top:14px;
}

.card-title{
  font-size:11px;
  color:var(--muted);
  text-transform:uppercase;
  margin-bottom:10px;
}

.item{
  padding:10px 0;
  border-bottom:1px solid #1a1a1a;
}

.line{
  display:flex;
  justify-content:space-between;
}

.left{
  display:flex;
  gap:10px;
  align-items:center;
}

.code{color:var(--muted);font-size:12px;min-width:90px;}
.div{width:2px;height:14px;background:#333;}
.name{font-size:13px;}
.green{color:var(--green);}
.red{color:var(--red);}

/* ORDER */
.order{
  border:1px solid var(--red);
  background:rgba(255,43,43,0.08);
}

/* GRAPH */
.chartBox{
  height:260px;
  padding:10px;
}

/* MOBILE */
@media(max-width:900px){
  .tabs{overflow-x:auto;flex-wrap:nowrap;}
  .chartBox{height:220px;}
}

</style>
</head>

<body>

<div class="header">
<div class="title">RamJet Racing Dealer Intelligence</div>
<div class="sub">Executive SKU Intelligence System</div>
</div>

<div class="tabs">
<button class="tab-btn active" onclick="show(0)">Dashboard</button>
<button class="tab-btn" onclick="show(1)">Growth</button>
<button class="tab-btn" onclick="show(2)">Core</button>
<button class="tab-btn" onclick="show(3)">Stable</button>
<button class="tab-btn" onclick="show(4)">Risk</button>
<button class="tab-btn" onclick="show(5)">New / Lost</button>
</div>

<div class="content">

<!-- ================= DASHBOARD ================= -->
<div class="tab active">

<div class="card">
<div class="card-title">Executive Snapshot</div>

<div class="chartBox">
<canvas id="salesChart"></canvas>
</div>

<div class="item"><div class="line"><div class="left"><div class="code">2025</div><span class="div"></span><div class="name">$65,668.68</div></div></div></div>
<div class="item"><div class="line"><div class="left"><div class="code">2026</div><span class="div"></span><div class="name red">$51,972.07</div></div></div></div>
<div class="item"><div class="line"><div class="left"><div class="code">YOY</div><span class="div"></span><div class="name red">-20.9%</div></div></div></div>
<div class="item"><div class="line"><div class="left"><div class="code">ROLLING 12</div><span class="div"></span><div class="name">$134,735.98</div></div></div></div>

</div>

</div>

<!-- OTHER TABS (UNCHANGED PLACEHOLDERS) -->
<div class="tab"><div class="card"><div class="card-title">Growth</div></div></div>
<div class="tab"><div class="card"><div class="card-title">Core</div></div></div>
<div class="tab"><div class="card"><div class="card-title">Stable</div></div></div>
<div class="tab"><div class="card"><div class="card-title">Risk</div></div></div>
<div class="tab"><div class="card"><div class="card-title">New / Lost</div></div></div>

</div>

<script>
function show(i){
let tabs=document.querySelectorAll(".tab");
let btn=document.querySelectorAll(".tab-btn");

tabs.forEach(t=>t.classList.remove("active"));
btn.forEach(b=>b.classList.remove("active"));

tabs[i].classList.add("active");
btn[i].classList.add("active");
}

/* ================= GRAPH ================= */
const ctx = document.getElementById('salesChart');

new Chart(ctx, {
  type: 'bar',
  data: {
    labels: ['2025 Sales', '2026 Sales'],
    datasets: [{
      label: 'Revenue',
      data: [65668.68, 51972.07],
      backgroundColor: ['#ff2b2b','#aa0000'],
      borderColor: '#ff2b2b',
      borderWidth: 1
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false }
    },
    scales: {
      x: {
        ticks: { color: '#fff' },
        grid: { color: '#222' }
      },
      y: {
        ticks: { color: '#fff' },
        grid: { color: '#222' }
      }
    }
  }
});
</script>

</body>
</html>
